[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fss-core"
version = "0.3.3"
description = "FSS protocol primitives: provenance, integrity, auth, FIT"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{name = "3soos3", email = "fss-chassis@3soos3.online"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = ["jcs>=0.2.0"]

[project.optional-dependencies]
auth = ["PyJWT>=2.8.0", "cryptography>=42.0.0", "httpx>=0.25,<1.0"]

[project.urls]
Repository = "https://github.com/3soos3/fss-chassis"

[tool.hatch.build.targets.wheel]
packages = ["src/fss_core"]
