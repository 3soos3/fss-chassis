[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "fss-mcp"
version = "0.3.4"
description = "FSS-compliant MCP server chassis"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [{name = "3soos3", email = "fss-chassis@3soos3.online"}]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Typing :: Typed",
]
dependencies = [
    "fss-core>=0.3",
    "mcp>=1.2.0,<2.0",
]

[project.optional-dependencies]
http = ["starlette>=0.37.0", "uvicorn[standard]>=0.27.0", "httpx>=0.25,<1.0"]
auth = ["PyJWT>=2.8.0", "cryptography>=42.0.0", "httpx>=0.25,<1.0"]
otel = ["opentelemetry-api>=1.20.0", "opentelemetry-sdk>=1.20.0",
        "opentelemetry-exporter-otlp-proto-grpc>=1.20.0"]

[project.scripts]
fss-mcp = "fss_mcp.__main__:main"

[project.urls]
Repository = "https://github.com/3soos3/fss-chassis"

[tool.uv.sources]
fss-core = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/fss_mcp"]
