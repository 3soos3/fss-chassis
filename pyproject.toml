[tool.uv.workspace]
members = ["packages/fss-core", "packages/fss-mcp"]

[dependency-groups]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.7.0",
    "mypy>=1.11.0",
    "pip-audit>=2.7.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["packages/fss-core/src", "packages/fss-mcp/src"]

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["packages/fss-core/src", "packages/fss-mcp/src",
       "packages/fss-core/tests", "packages/fss-mcp/tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B", "UP"]
ignore = ["B008"]

[tool.mypy]
python_version = "3.11"
strict = true
ignore_missing_imports = true
